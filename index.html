<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Thomas Hyrox Day</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  width: 100%;
  min-height: 100%;
  background: #ffd6e8;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

body {
  min-height: 100svh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}

.wrapper {
  position: relative;
  width: 100vw;
  height: 100svh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.poster {
  position: relative;
  height: 100svh;
  width: auto;
  max-width: 100vw;
}

.poster img {
  height: 100%;
  width: auto;
  max-width: 100vw;
  object-fit: contain;
  display: block;
}

/* BUTTON PAS DI ATAS TOMBOL CLICK ME YANG ADA DI GAMBAR */
.real-button {
  position: absolute;
  left: 50%;
  top: 75.5%;
  transform: translate(-50%, -50%);
  width: min(58vw, 280px);
  height: 70px;
  border: none;
  background: transparent;
  cursor: pointer;
  z-index: 10;
}

.letter {
  position: fixed;
  inset: 0;
  background: rgba(255, 214, 232, 0.96);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 24px;
  z-index: 99;
}

.letter-card {
  max-width: 380px;
  background: #fff8fc;
  border: 4px solid #ff75b6;
  border-radius: 24px;
  padding: 24px 20px;
  text-align: center;
  box-shadow: 8px 8px 0 #ffb6d9;
  color: #8b4a73;
  line-height: 1.7;
  font-weight: 700;
}

.letter-card h2 {
  color: #ff4fa3;
  margin-top: 0;
}

.close {
  margin-top: 18px;
  padding: 14px 22px;
  border: none;
  border-radius: 16px;
  background: #ff75b6;
  color: white;
  font-weight: 800;
  font-size: 15px;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="poster">
    <img src="bg.png" alt="Thomas Hyrox Day" />
    <button class="real-button" onclick="openLetter()" aria-label="Click me"></button>
  </div>
</div>

<div class="letter" id="letter">
  <div class="letter-card">
    <h2>For Thomas Sayang!</h2>

    <p>
      Thomas Sayang, its okay to feel nervous yaaa?
      Just trust yourself and remember how hard you've worked for this
    </p>

    <p>
      No matter the result, I'm already so proud of you Thomas sayang!!!
    </p>

    <p>
      You got this, handsome. I'll be cheering for you all the way!!!!
    </p>

    <h3>SEMANGAT HYROX NYAA MY HELEMM!!🏅💗</h3>

    <button class="close" onclick="closeLetter()">Close 💌</button>
  </div>
</div>

<script>
function openLetter() {
  document.getElementById("letter").style.display = "flex";
}

function closeLetter() {
  document.getElementById("letter").style.display = "none";
}
</script>

</body>
</html>
